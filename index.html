<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mini App Tổng Overview Chi Tiêu</title>
  
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="upgrade.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>
  <!-- Dùng bản rời (unbundled) thay vì html2pdf.bundle.min.js vì bản bundle
       đóng gói nội bộ (webpack) không phơi html2canvas/jSPDF ra window,
       trong khi script cần gọi trực tiếp 2 thư viện này. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="theme-auto">
  <div class="content-wrapper">
    <div class="app-branding">©masterhmh</div>
    
    <div id="tab1" class="tab-content active">
      <input type="date" id="transactionDate" style="display:none;">
      <div class="hero-card">
        <div class="hero-date-nav">
          <button id="prevDayBtn" class="date-nav-btn"><i class="fas fa-chevron-left"></i></button>
          <div class="hero-date" id="displayCurrentDate">Hôm nay, ...</div>
          <i class="fas fa-caret-down" style="color: rgba(255,255,255,0.6); font-size: 0.75rem; cursor: pointer;"></i>
          <button id="nextDayBtn" class="date-nav-btn"><i class="fas fa-chevron-right"></i></button>
        </div>
        
        <div class="hero-label" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
          <div><i class="fas fa-money-bill-transfer"></i> Chi tiêu trong ngày</div>
          <i class="fas fa-eye-slash privacy-toggle-btn" onclick="togglePrivacy()" style="font-size: 1.15rem; cursor: pointer; padding: 4px; color: rgba(255,255,255,0.8);"></i>
        </div>
        <div class="hero-balance" id="heroExpenseMain"><span style="opacity:0.45;">—</span></div>
        <div id="heroExpenseCompare"></div>
        <div class="hero-sub">
          <div class="hero-stat">
            <div class="hero-stat-label"><i class="fas fa-hand-holding-dollar"></i> Thu nhập</div>
            <div class="hero-stat-val" id="heroIncome"><span style="opacity:0.45;">—</span></div>
          </div>
          <div class="divider-v"></div>
          <div class="hero-stat">
            <div class="hero-stat-label"><i class="fas fa-wallet"></i> Số dư</div>
            <div class="hero-stat-val" id="heroBalanceSub"><span style="opacity:0.45;">—</span></div>
          </div>
        </div>
      </div>

      <div id="loadingTab1" class="loading-spinner" style="display: none;"><i class="fas fa-spinner fa-spin"></i></div>
           
      <div class="section-header">
        <span class="section-title">Giao dịch trong ngày</span>
      </div>
      <div id="placeholderTab1" class="empty-state" style="display: none;">Không có giao dịch nào trong ngày này</div>
      <div class="tx-list" id="transactionsContainer"></div>
      
      <div id="pagination" class="pagination-container" style="display: none;">
        <button id="prevPage" class="pagination-btn" disabled><i class="fas fa-chevron-left"></i></button>
        <span id="pageInfo" class="pagination-info"></span>
        <button id="nextPage" class="pagination-btn"><i class="fas fa-chevron-right"></i></button>
      </div>
    </div>

    <div id="tab2" class="tab-content">
      <div id="tab2Overview">
          <div class="section-header">
            <span class="section-title">Báo Cáo Tài Chính</span>
          </div>
          
          <div class="period-pills">
            <div id="filterWeeklyBtn" class="period-pill active">Theo tuần</div>
            <div id="filterMonthlyBtn" class="period-pill">Theo tháng</div>
            <div id="filterYearlyBtn" class="period-pill">Cả năm</div>
            <div id="filterCustomBtn" class="period-pill">Tùy chọn</div>
          </div>

          <div id="timeNavContainer" class="time-nav-container" style="display: flex;">
            <button id="prevPeriodBtn" class="nav-arrow-btn"><i class="fas fa-chevron-left"></i></button>
            <div class="time-nav-center">
               <span id="currentPeriodLabel">Tuần này</span>
               <input type="week" id="weekPicker" class="hidden-picker" style="display: none;">
               <input type="month" id="monthPicker" class="hidden-picker" style="display: none;">
            </div>
            <button id="nextPeriodBtn" class="nav-arrow-btn"><i class="fas fa-chevron-right"></i></button>
          </div>

          <div id="customFilterContainer" class="filter-controls" style="display: none;">
            <select id="startMonth" class="field-input flex-1">
              <option value="1">Tháng 1</option><option value="2">Tháng 2</option><option value="3">Tháng 3</option><option value="4">Tháng 4</option><option value="5">Tháng 5</option><option value="6">Tháng 6</option><option value="7">Tháng 7</option><option value="8">Tháng 8</option><option value="9">Tháng 9</option><option value="10">Tháng 10</option><option value="11">Tháng 11</option><option value="12">Tháng 12</option>
            </select>
            <span class="filter-separator">đến</span>
            <select id="endMonth" class="field-input flex-1">
              <option value="1">Tháng 1</option><option value="2">Tháng 2</option><option value="3">Tháng 3</option><option value="4">Tháng 4</option><option value="5">Tháng 5</option><option value="6">Tháng 6</option><option value="7">Tháng 7</option><option value="8">Tháng 8</option><option value="9">Tháng 9</option><option value="10">Tháng 10</option><option value="11">Tháng 11</option><option value="12">Tháng 12</option>
            </select>
            <button id="fetchCustomDataBtn" class="btn-save btn-filter"><i class="fas fa-search"></i></button>
          </div>

          <div id="loadingTab2" class="loading-spinner" style="display: none;"><i class="fas fa-spinner fa-spin"></i></div>

          <div class="stat-grid" id="monthlyStatsContainer">
            <div class="stat-card">
              <div class="stat-header card-income">
                  <i class="fas fa-hand-holding-dollar"></i>
                  <span class="stat-tag">Thu nhập</span>
              </div>
              <div class="stat-num income" id="tab2Income"><span style="opacity:0.45;">—</span></div>
              <div class="stat-compare" id="tab2IncomeCompare">-</div>
            </div>
            
            <div class="stat-card">
              <div class="stat-header card-expense">
                  <i class="fas fa-money-bill-transfer"></i>
                  <span class="stat-tag">Chi tiêu</span>
              </div>
              <div class="stat-num expense" id="tab2Expense"><span style="opacity:0.45;">—</span></div>
              <div class="stat-compare" id="tab2ExpenseCompare">-</div>
            </div>
            
            <div class="stat-card">
              <div class="stat-header card-balance" style="display: flex; justify-content: space-between; width: 100%;">
                  <div style="display:flex; align-items:center; gap:6px;">
                      <i class="fas fa-wallet"></i>
                      <span class="stat-tag">Số dư</span>
                  </div>
                  <i class="fas fa-eye-slash privacy-toggle-btn" onclick="togglePrivacy()" style="cursor:pointer; color:var(--text-3); font-size
